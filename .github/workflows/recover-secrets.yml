name: "🔑 RECOVER AZURE SECRETS"

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  discover-and-recover:
    name: Discover Azure Resources & Secrets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # --- TEST SET 1 ---
      - name: Login to Azure (Set 1)
        uses: azure/login@v2
        continue-on-error: true
        id: login_set_1
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_97033D0873224A139B78B461AC75E043 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_56AD104E38094E8BB5F1B4B8229A45D4 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_F3C7A6FB528748EB9BBC4B542FBED0D7 }}

      - name: Discover Resources (Set 1)
        if: steps.login_set_1.outcome == 'success'
        run: |
          echo "=== SET 1: LOGGED IN SUCCESSFULLY ==="
          
          echo "--- Subscriptions ---"
          az account list -o table || true
          
          echo "--- Resource Groups ---"
          az group list -o table || true
          
          echo "--- Web Apps ---"
          az webapp list --query "[].{name:name, resourceGroup:resourceGroup}" -o table || true
          
          echo "--- Static Web Apps ---"
          az staticwebapp list --query "[].{name:name, resourceGroup:resourceGroup, defaultHostname:defaultHostname}" -o table || true
          
          echo "--- Container Apps ---"
          az containerapp list --query "[].{name:name, resourceGroup:resourceGroup}" -o table || true
          
          echo "--- Trying to read settings for Web App 'tesst' ---"
          az webapp config appsettings list --name tesst --resource-group al-sufi-rg || true
          az webapp config appsettings list --name tesst --resource-group al-sufi-rg-prod || true
          
          echo "--- Trying to read Static Web App 'al-sufi-web' secrets ---"
          az staticwebapp secrets list --name al-sufi-web --resource-group al-sufi-rg || true

      # --- TEST SET 2 ---
      - name: Login to Azure (Set 2)
        uses: azure/login@v2
        continue-on-error: true
        id: login_set_2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_98048D43C37040608D0041E7179DB468 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_F1A5AF4518B14234809D584C06810E48 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_878108B148EF4F5EA29A84678A66DD69 }}

      - name: Discover Resources (Set 2)
        if: steps.login_set_2.outcome == 'success'
        run: |
          echo "=== SET 2: LOGGED IN SUCCESSFULLY ==="
          
          echo "--- Subscriptions ---"
          az account list -o table || true
          
          echo "--- Resource Groups ---"
          az group list -o table || true
          
          echo "--- Web Apps ---"
          az webapp list --query "[].{name:name, resourceGroup:resourceGroup}" -o table || true
          
          echo "--- Static Web Apps ---"
          az staticwebapp list --query "[].{name:name, resourceGroup:resourceGroup, defaultHostname:defaultHostname}" -o table || true
          
          echo "--- Container Apps ---"
          az containerapp list --query "[].{name:name, resourceGroup:resourceGroup}" -o table || true
          
          echo "--- Trying to read settings for Web App 'tesst' ---"
          az webapp config appsettings list --name tesst --resource-group al-sufi-rg || true
          az webapp config appsettings list --name tesst --resource-group al-sufi-rg-prod || true
          
          echo "--- Trying to read Static Web App 'al-sufi-web' secrets ---"
          az staticwebapp secrets list --name al-sufi-web --resource-group al-sufi-rg || true
