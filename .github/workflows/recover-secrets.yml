name: "🔑 RECOVER AZURE SECRETS"

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  recover-set-1:
    name: Recover using Secrets Set 1
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Azure (Set 1)
        uses: azure/login@v2
        continue-on-error: true
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_97033D0873224A139B78B461AC75E043 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_56AD104E38094E8BB5F1B4B8229A45D4 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_F3C7A6FB528748EB9BBC4B542FBED0D7 }}

      - name: Run Recovery (Set 1)
        run: |
          RG="al-sufi-rg"
          echo "=== Azure Account ==="
          az account show || echo "Not logged in"
          
          echo "=== Fetching Secrets ==="
          # Storage Account
          STORAGE_ACCOUNT=$(az storage account list --resource-group $RG --query "[?contains(name, 'alsufistorage')].name" -o tsv | head -n 1)
          if [ -n "$STORAGE_ACCOUNT" ]; then
            STORAGE_KEY=$(az storage account keys list --account-name $STORAGE_ACCOUNT --resource-group $RG --query '[0].value' -o tsv)
            echo "SUCCESS_STORAGE_ACCOUNT=$STORAGE_ACCOUNT"
            echo "SUCCESS_STORAGE_KEY=$STORAGE_KEY"
          fi
          
          # Container Registry
          ACR_USER=$(az acr credential show --name alsufiacr --resource-group $RG --query username -o tsv)
          ACR_PASS=$(az acr credential show --name alsufiacr --resource-group $RG --query "passwords[0].value" -o tsv)
          echo "SUCCESS_ACR_USER=$ACR_USER"
          echo "SUCCESS_ACR_PASS=$ACR_PASS"
          
          # Static Web App
          SWA_TOKEN=$(az staticwebapp secrets list --name al-sufi-web --resource-group $RG --query 'properties.apiKey' -o tsv)
          echo "SUCCESS_SWA_TOKEN=$SWA_TOKEN"
          
          # Communication Services
          ACS_ENDPOINT="https://$(az communication show --name al-sufi-comms --resource-group $RG --query 'hostName' -o tsv)"
          ACS_KEY=$(az communication list-key --name al-sufi-comms --resource-group $RG --query 'primaryKey' -o tsv)
          ACS_SENDER_DOMAIN=$(az communication email domain list --email-service-name al-sufi-email --resource-group $RG --query "[0].mailFromSenderDomain" -o tsv)
          echo "SUCCESS_ACS_ENDPOINT=$ACS_ENDPOINT"
          echo "SUCCESS_ACS_KEY=$ACS_KEY"
          echo "SUCCESS_ACS_FROM=DoNotReply@$ACS_SENDER_DOMAIN"

  recover-set-2:
    name: Recover using Secrets Set 2
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Azure (Set 2)
        uses: azure/login@v2
        continue-on-error: true
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_98048D43C37040608D0041E7179DB468 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_F1A5AF4518B14234809D584C06810E48 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_878108B148EF4F5EA29A84678A66DD69 }}

      - name: Run Recovery (Set 2)
        run: |
          RG="al-sufi-rg"
          echo "=== Azure Account ==="
          az account show || echo "Not logged in"
          
          echo "=== Fetching Secrets ==="
          # Storage Account
          STORAGE_ACCOUNT=$(az storage account list --resource-group $RG --query "[?contains(name, 'alsufistorage')].name" -o tsv | head -n 1)
          if [ -n "$STORAGE_ACCOUNT" ]; then
            STORAGE_KEY=$(az storage account keys list --account-name $STORAGE_ACCOUNT --resource-group $RG --query '[0].value' -o tsv)
            echo "SUCCESS_STORAGE_ACCOUNT=$STORAGE_ACCOUNT"
