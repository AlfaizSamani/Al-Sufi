          fi
          
          # Container Registry
          ACR_USER=$(az acr credential show --name alsufiacr --resource-group $RG --query username -o tsv)
          ACR_PASS=$(az acr credential show --name alsufiacr --resource-group $RG --query "passwords[0].value" -o tsv)
          echo "SUCCESS_ACR_USER=$ACR_USER"
          echo "SUCCESS_ACR_PASS=$ACR_PASS"
          
          # Static Web App
          SWA_TOKEN=$(az staticwebapp secrets list --name al-sufi-web --resource-group $RG --query 'properties.apiKey' -o tsv)
          echo "SUCCESS_SWA_TOKEN=$SWA_TOKEN"
          
          # Communication Services
          ACS_ENDPOINT="https://$(az communication show --name al-sufi-comms --resource-group $RG --query 'hostName' -o tsv)"
          ACS_KEY=$(az communication list-key --name al-sufi-comms --resource-group $RG --query 'primaryKey' -o tsv)
          ACS_SENDER_DOMAIN=$(az communication email domain list --email-service-name al-sufi-email --resource-group $RG --query "[0].mailFromSenderDomain" -o tsv)
