name: "🔍 DIAGNOSE SECRETS AND PROVIDERS"

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/diagnose-secrets.yml'

permissions:
  id-token: write
  contents: read

jobs:
  diagnose:
    name: Secrets & Azure Provider Diagnostics
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Check Github Secrets Presence (Safe) ──
      - name: Check Secrets Presence
        run: |
          echo "=== CHECKING GITHUB SECRETS (LENGTH & STATUS) ==="
          
          check_secret() {
            local name=$1
            local value=$2
            if [ -n "$value" ]; then
              echo "✓ $name is SET (length: ${#value})"
            else
              echo "❌ $name is MISSING"
            fi
          }

          check_secret "AZURE_CLIENT_ID" "${{ secrets.AZURE_CLIENT_ID }}"
          check_secret "AZURE_TENANT_ID" "${{ secrets.AZURE_TENANT_ID }}"
          check_secret "AZURE_SUBSCRIPTION_ID" "${{ secrets.AZURE_SUBSCRIPTION_ID }}"
          
          check_secret "ACR_LOGIN_SERVER" "${{ secrets.ACR_LOGIN_SERVER }}"
          check_secret "ACR_USERNAME" "${{ secrets.ACR_USERNAME }}"
          check_secret "ACR_PASSWORD" "${{ secrets.ACR_PASSWORD }}"
          
          check_secret "AZURE_STORAGE_ACCOUNT" "${{ secrets.AZURE_STORAGE_ACCOUNT }}"
          check_secret "AZURE_STORAGE_KEY" "${{ secrets.AZURE_STORAGE_KEY }}"
          check_secret "AZURE_BLOB_CONTAINER" "${{ secrets.AZURE_BLOB_CONTAINER }}"
          
          check_secret "POSTGRES_PASSWORD" "${{ secrets.POSTGRES_PASSWORD }}"
          check_secret "SITE_URL" "${{ secrets.SITE_URL }}"
          check_secret "OPERATOR_TOKEN" "${{ secrets.OPERATOR_TOKEN }}"
          check_secret "JWT_SECRET" "${{ secrets.JWT_SECRET }}"
          check_secret "ANON_KEY" "${{ secrets.ANON_KEY }}"
          check_secret "SERVICE_ROLE_KEY" "${{ secrets.SERVICE_ROLE_KEY }}"
          
          check_secret "SMTP_ADMIN_EMAIL" "${{ secrets.SMTP_ADMIN_EMAIL }}"
          check_secret "ACS_SMTP_USER" "${{ secrets.ACS_SMTP_USER }}"
          check_secret "ACS_SMTP_PASS" "${{ secrets.ACS_SMTP_PASS }}"
          check_secret "ACS_EMAIL_ENDPOINT" "${{ secrets.ACS_EMAIL_ENDPOINT }}"
          check_secret "ACS_EMAIL_ACCESS_KEY" "${{ secrets.ACS_EMAIL_ACCESS_KEY }}"
          check_secret "ACS_EMAIL_FROM" "${{ secrets.ACS_EMAIL_FROM }}"
          
          check_secret "VITE_SUPABASE_URL" "${{ secrets.VITE_SUPABASE_URL }}"
          check_secret "VITE_SUPABASE_PUBLISHABLE_KEY" "${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}"
          check_secret "VITE_SUPABASE_PROJECT_ID" "${{ secrets.VITE_SUPABASE_PROJECT_ID }}"
          
          check_secret "AZURE_STATIC_WEB_APPS_API_TOKEN" "${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}"
          
          echo ""
          echo "=== CHECKING LEGACY/APP-SERVICE SECRETS ==="
          check_secret "AZUREAPPSERVICE_CLIENTID_9703..." "${{ secrets.AZUREAPPSERVICE_CLIENTID_97033D0873224A139B78B461AC75E043 }}"
          check_secret "AZUREAPPSERVICE_CLIENTID_9804..." "${{ secrets.AZUREAPPSERVICE_CLIENTID_98048D43C37040608D0041E7179DB468 }}"

      # ── Try Login with AZURE_CLIENT_ID (OIDC) ──
      - name: Try Login (Primary AZURE_CLIENT_ID)
        uses: azure/login@v2
        continue-on-error: true
        id: login_primary
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Diagnostics & Register (Primary)
        if: steps.login_primary.outcome == 'success'
        run: |
          echo "=== PRIMARY AZURE CLIENT ID LOGIN SUCCESS ==="
          echo "--- Account Info ---"
          az account show -o table
          
          echo "--- Registering Resource Providers ---"
          echo "Registering Microsoft.App..."
          az provider register --namespace Microsoft.App
          echo "Registering Microsoft.OperationalInsights..."
          az provider register --namespace Microsoft.OperationalInsights
          
          echo "--- Resource Groups ---"
          az group list -o table
          
          echo "--- Checking Group 'al-sufi-rg' ---"
          az group show --name al-sufi-rg -o json || echo "⚠️ Cannot access group 'al-sufi-rg' or it doesn't exist"

      # ── Try Login with Legacy AppService SP 1 ──
      - name: Try Login (Legacy SP 1)
        uses: azure/login@v2
        continue-on-error: true
        id: login_legacy_1
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_97033D0873224A139B78B461AC75E043 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_56AD104E38094E8BB5F1B4B8229A45D4 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_F3C7A6FB528748EB9BBC4B542FBED0D7 }}

      - name: Diagnostics & Register (Legacy SP 1)
        if: steps.login_legacy_1.outcome == 'success'
        run: |
          echo "=== LEGACY SP 1 LOGIN SUCCESS ==="
          echo "--- Account Info ---"
          az account show -o table
          
          echo "--- Registering Resource Providers ---"
          echo "Registering Microsoft.App..."
          az provider register --namespace Microsoft.App
          echo "Registering Microsoft.OperationalInsights..."
          az provider register --namespace Microsoft.OperationalInsights
          
          echo "--- Resource Groups ---"
          az group list -o table
          
          echo "--- Checking Group 'al-sufi-rg' ---"
          az group show --name al-sufi-rg -o json || echo "⚠️ Cannot access group 'al-sufi-rg' or it doesn't exist"

      # ── Try Login with Legacy AppService SP 2 ──
      - name: Try Login (Legacy SP 2)
        uses: azure/login@v2
        continue-on-error: true
        id: login_legacy_2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_98048D43C37040608D0041E7179DB468 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_F1A5AF4518B14234809D584C06810E48 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_878108B148EF4F5EA29A84678A66DD69 }}

      - name: Diagnostics & Register (Legacy SP 2)
        if: steps.login_legacy_2.outcome == 'success'
        run: |
          echo "=== LEGACY SP 2 LOGIN SUCCESS ==="
          echo "--- Account Info ---"
          az account show -o table
          
          echo "--- Registering Resource Providers ---"
          echo "Registering Microsoft.App..."
          az provider register --namespace Microsoft.App
          echo "Registering Microsoft.OperationalInsights..."
          az provider register --namespace Microsoft.OperationalInsights
          
          echo "--- Resource Groups ---"
          az group list -o table
          
          echo "--- Checking Group 'al-sufi-rg' ---"
          az group show --name al-sufi-rg -o json || echo "⚠️ Cannot access group 'al-sufi-rg' or it doesn't exist"
