name: "🔑 SECRET KEY RECOVERY TOOL"

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  recover:
    runs-on: ubuntu-latest
    steps:
      - name: "🔓 REVEAL REMOTE VM KEY"
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AZURE_VM_IP }}
          username: ${{ secrets.AZURE_VM_USER }}
          key: ${{ secrets.AZURE_VM_SSH_KEY }}
          script: |
            echo "--- START ---"
            grep "ANON_KEY=" ~/supabase-deploy/.env | cut -d'=' -f2 | rev | base64
            echo "--- END ---"
